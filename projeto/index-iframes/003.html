<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora</title>
<style>
    * {
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background: radial-gradient(circle at 20% 20%, #0c2a45, #071a2d 40%, #051422 100%);
    }

    .calculadora {
        width: 240px;           /* mais compacta para caber no iframe */
        padding: 15px;
        border-radius: 20px;    /* cantos bem arredondados */
        background: rgba(255,255,255,0.1); /* transparente leve */
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.2);
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    #display {
        width: 100%;
        height: 40px;            /* mais achatado */
        border-radius: 12px;
        border: none;
        text-align: right;
        padding: 8px;
        font-size: 1.2em;
        margin-bottom: 12px;
        background-color: rgba(255,255,255,0.15);
        color: #ffffff;
    }

    .botoes {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
    }

    button {
        padding: 10px;
        font-size: 1em;
        border-radius: 12px;
        border: none;
        cursor: pointer;
        background: rgba(255,255,255,0.1);
        color: #ffffff;
        transition: all 0.2s ease-in-out;
    }

button:hover {
    background: rgba(96,165,250,0.6);
    box-shadow: 0 4px 12px rgba(96,165,250,0.5);
    transform: translateY(-2px);
}


    button.operator {
        background: rgba(147,51,234,0.6); 
    }

    button.operator:hover {
        background: rgba(147,51,234,0.8);
    }

    .clear {
    grid-column: span 4;
    background-color: rgba(247, 102, 102,0.8);
    color: #fff;
}

.clear:hover {
    background-color: rgba(247, 102, 102,1);
    box-shadow: 0 4px 12px rgba(247,102,102,0.5);
    transform: translateY(-2px);
}
</style>
</head>
<body>
    <div class="calculadora">
        <input type="text" id="display" disabled placeholder="0">
        <div class="botoes">
            <button onclick="adicionarValor('7')">7</button>
            <button onclick="adicionarValor('8')">8</button>
            <button onclick="adicionarValor('9')">9</button>
            <button class="operator" onclick="adicionarValor('/')">/</button>

            <button onclick="adicionarValor('4')">4</button>
            <button onclick="adicionarValor('5')">5</button>
            <button onclick="adicionarValor('6')">6</button>
            <button class="operator" onclick="adicionarValor('*')">*</button>

            <button onclick="adicionarValor('1')">1</button>
            <button onclick="adicionarValor('2')">2</button>
            <button onclick="adicionarValor('3')">3</button>
            <button class="operator" onclick="adicionarValor('-')">-</button>

            <button onclick="adicionarValor('0')">0</button>
            <button onclick="adicionarValor('.')">.</button>
            <button onclick="calcular()">=</button>
            <button class="operator" onclick="adicionarValor('+')">+</button>

            <button onclick="limpar()" class="clear">C</button>
        </div>
    </div>

<script>
let display = document.getElementById('display');

function adicionarValor(valor){
    display.value += valor;
}

function calcular(){
    try {
        display.value = eval(display.value);
    } catch {
        display.value = 'Erro';
    }
}

function limpar(){
    display.value = '';
}
</script>
</body>
</html>
