<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
</head>
<style>
    * {
        padding: 0px;
        margin: 0px;
        box-sizing: border-box;
    }
    .calculadora {
    width: 250px;
    margin: 50px auto;
    border: 2px solid #333;
    border-radius: 10px;
    padding: 10px;
    background-color: #f3f3f3;
}

#display {
    width: 100%;
    height: 40px;
    margin-bottom: 10px;
    text-align: right;
    font-size: 1.2em;
    padding: 5px;
}

body {
    overflow: hidden;
}

.botoes {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
}

button {
    height: 40px;
    font-size: 1.1em;
    border-radius: 5px;
    border: none;
    background-color: #ddd;
    cursor: pointer;
}

button:hover {
    background-color: #ccc;
}

.clear {
    grid-column: span 4;
    background-color: #f66;
    color: white;
}
</style>
<body>
    <div class="calculadora">
    <input type="text" id="display" disabled placeholder="0">

    <div class="botoes">
        <button onclick="adicionarValor('7')">7</button>
        <button onclick="adicionarValor('8')">8</button>
        <button onclick="adicionarValor('9')">9</button>
        <button onclick="adicionarValor('/')">/</button>

        <button onclick="adicionarValor('4')">4</button>
        <button onclick="adicionarValor('5')">5</button>
        <button onclick="adicionarValor('6')">6</button>
        <button onclick="adicionarValor('*')">*</button>

        <button onclick="adicionarValor('1')">1</button>
        <button onclick="adicionarValor('2')">2</button>
        <button onclick="adicionarValor('3')">3</button>
        <button onclick="adicionarValor('-')">-</button>

        <button onclick="adicionarValor('0')">0</button>
        <button onclick="adicionarValor('.')">.</button>
        <button onclick="calcular()">=</button>
        <button onclick="adicionarValor('+')">+</button>

        <button onclick="limpar()" class="clear">C</button>
    </div>
</div>
<script>
    let display = document.getElementById('display');

function adicionarValor(valor) {
    display.value += valor;
}

function calcular() {
    try {
        display.value = eval(display.value); 
    } catch {
        display.value = 'Erro';
    }
}

function limpar() {
    display.value = '';
}
</script>
</body>
</html>
